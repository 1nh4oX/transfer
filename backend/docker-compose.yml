services:
  db:
    image: postgres:16
    container_name: transfer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transfer}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-transfer}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transfer-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-transfer}?sslmode=disable
      UPLOAD_DIR: /app/uploads
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      DEMO_USERNAME: ${DEMO_USERNAME:-admin}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-change_me}
    volumes:
      - uploads:/app/uploads
    ports:
      - "${API_PORT:-8080}:8080"

volumes:
  pgdata:
  uploads:
